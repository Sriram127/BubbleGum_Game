<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BubbleGum Game</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Number matching arcade</p>
          <h1>BubbleGum Game</h1>
        </div>
        <button id="soundToggle" class="ghost-button" type="button">Sound On</button>
      </section>

      <section class="scoreboard" aria-label="Game status">
        <article>
          <span>Hit</span>
          <strong id="hitVal">-</strong>
        </article>
        <article>
          <span>Time</span>
          <strong id="timerVal">60</strong>
        </article>
        <article>
          <span>Score</span>
          <strong id="scoreVal">0</strong>
        </article>
        <article>
          <span>Best</span>
          <strong id="bestVal">0</strong>
        </article>
      </section>

      <section id="panel" aria-live="polite">
        <div id="gameBoard"></div>
      </section>
    </main>

    <audio id="gameOverSound" src="./sfx-defeat3.mp3" preload="auto"></audio>
    <script src="./script.js"></script>
  </body>
</html>
